<svg xmlns="http://www.w3.org/2000/svg" width="1148" height="510" viewBox="16 88 1148 510" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A87E0D"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F9D55"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3D82C4"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F857B"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1a1a1a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- ===================== LEFT: Databricks Lakehouse ===================== -->
  <rect x="40" y="104" width="470" height="472" rx="16" fill="#FFFFFF" stroke="#E7E4DB" stroke-width="1" filter="url(#sh)"/>
  <path d="M40,148 V118 a14,14 0 0 1 14,-14 H496 a14,14 0 0 1 14,14 V148 Z" fill="#E1503A"/>
  <g fill="#FFFFFF">
    <rect x="60" y="129" width="3.4" height="8" rx="0.5"/>
    <rect x="65" y="123" width="3.4" height="14" rx="0.5"/>
    <rect x="70" y="126" width="3.4" height="11" rx="0.5"/>
  </g>
  <text x="82" y="133" font-size="14.5" font-weight="bold" fill="#FFFFFF">Databricks Lakehouse</text>
  <text x="275" y="170" text-anchor="middle" font-size="12" font-style="italic" fill="#8A8579">Instance layer: Unity Catalog Delta tables</text>

  <!-- Core instance tables card -->
  <rect x="60" y="184" width="430" height="188" rx="10" fill="#FDF2EF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="78" y="209" font-size="11.5" font-weight="bold" letter-spacing="0.6" fill="#C42B12">CORE INSTANCE TABLES</text>
  <text x="472" y="209" text-anchor="end" font-size="9.5" font-style="italic" fill="#B79187">the facts</text>

  <!-- suppliers -->
  <rect x="80" y="232" width="15" height="17" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="80" y1="236.5" x2="95" y2="236.5" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="106" y="245" font-size="15" font-weight="bold" fill="#16233A">suppliers</text>
  <!-- invoices -->
  <rect x="80" y="272" width="15" height="17" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="80" y1="276.5" x2="95" y2="276.5" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="106" y="285" font-size="15" font-weight="bold" fill="#16233A">invoices</text>
  <!-- business_units -->
  <rect x="80" y="312" width="15" height="17" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="80" y1="316.5" x2="95" y2="316.5" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="106" y="325" font-size="15" font-weight="bold" fill="#16233A">business_units</text>

  <text x="80" y="357" font-size="11" font-style="italic" fill="#9A9488">+ customers &#183; revenue_entries &#183; compliance_findings</text>

  <!-- Gold write-back card -->
  <rect x="60" y="392" width="430" height="162" rx="10" fill="#ECFDF3" stroke="#1F9D55" stroke-width="1.6"/>
  <text x="78" y="417" font-size="12.5" font-weight="bold" fill="#166534">Gold write-back tables</text>
  <text x="472" y="417" text-anchor="end" font-size="9.5" font-style="italic" fill="#6FA98A">sourced from graph</text>

  <!-- classifications -->
  <rect x="80" y="438" width="15" height="17" rx="2" fill="#D6F5E2" stroke="#1F9D55" stroke-width="1"/>
  <line x1="80" y1="442.5" x2="95" y2="442.5" stroke="#1F9D55" stroke-width="1" stroke-opacity="0.45"/>
  <text x="106" y="451" font-size="14" font-family="Menlo, monospace" font-weight="bold" fill="#166534">classifications</text>
  <text x="106" y="470" font-size="11" fill="#3F7D5C">each entity tagged with a governed term + why</text>

  <!-- business_unit_exposure -->
  <rect x="80" y="498" width="15" height="17" rx="2" fill="#D6F5E2" stroke="#1F9D55" stroke-width="1"/>
  <line x1="80" y1="502.5" x2="95" y2="502.5" stroke="#1F9D55" stroke-width="1" stroke-opacity="0.45"/>
  <text x="106" y="511" font-size="14" font-family="Menlo, monospace" font-weight="bold" fill="#166534">business_unit_exposure</text>
  <text x="106" y="530" font-size="11" fill="#3F7D5C">supplier exposure score per business unit (GDS)</text>

  <!-- ===================== RIGHT: Neo4j ===================== -->
  <rect x="670" y="104" width="470" height="472" rx="16" fill="#FFFFFF" stroke="#E7E4DB" stroke-width="1" filter="url(#sh)"/>
  <path d="M670,148 V118 a14,14 0 0 1 14,-14 H1126 a14,14 0 0 1 14,14 V148 Z" fill="#018BFF"/>
  <path d="M690,123 L695,128 L690,133 L685,128 Z" fill="#FFFFFF"/>
  <text x="706" y="133" font-size="14.5" font-weight="bold" fill="#FFFFFF">Neo4j Knowledge Graph</text>

  <!-- Knowledge layer -->
  <rect x="690" y="156" width="430" height="158" rx="10" fill="#FFFAEC" stroke="#D4A017" stroke-width="1.4"/>
  <text x="708" y="176" font-size="12.5" font-weight="bold" fill="#92660A">Knowledge layer</text>
  <text x="1102" y="176" text-anchor="end" font-size="9.5" font-style="italic" fill="#B79A4E">terms, rules &amp; meaning you own</text>

  <!-- knowledge edge labels (above the pill row) -->
  <text x="844" y="193" text-anchor="middle" font-size="9" fill="#A87E0D">DEFINED_BY</text>
  <text x="988" y="193" text-anchor="middle" font-size="9" fill="#A87E0D">EVALUATES</text>

  <!-- knowledge pills (row 1) -->
  <rect x="712" y="199" width="120" height="34" rx="17" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.3"/>
  <text x="772" y="221" text-anchor="middle" font-size="12.5" fill="#6B4E07">BusinessTerm</text>
  <rect x="1000" y="199" width="120" height="34" rx="17" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.3"/>
  <text x="1060" y="221" text-anchor="middle" font-size="12.5" fill="#6B4E07">BusinessRule</text>
  <rect x="856" y="199" width="120" height="34" rx="17" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.3"/>
  <text x="916" y="221" text-anchor="middle" font-size="12.5" fill="#6B4E07">Entity</text>

  <!-- knowledge edges (Entity in the middle links to Term and Rule) -->
  <line x1="854" y1="216" x2="834" y2="216" stroke="#A87E0D" stroke-width="1.4" marker-end="url(#arrow-gold)"/>
  <line x1="978" y1="216" x2="998" y2="216" stroke="#A87E0D" stroke-width="1.4" marker-end="url(#arrow-gold)"/>

  <!-- DataSource (row 2, under Entity): Entity MAPS_TO DataSource -->
  <line x1="916" y1="235" x2="916" y2="253" stroke="#A87E0D" stroke-width="1.4" marker-end="url(#arrow-gold)"/>
  <text x="924" y="248" font-size="9" fill="#A87E0D">MAPS_TO</text>
  <rect x="856" y="255" width="120" height="34" rx="17" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.3"/>
  <text x="916" y="277" text-anchor="middle" font-size="12.5" fill="#6B4E07">DataSource</text>

  <text x="708" y="306" font-size="11" font-style="italic" fill="#B79A4E">+ Threshold &#183; Policy</text>

  <!-- Center anchors: GOVERNS (down) / CLASSIFIES (up) — each arrow carries its own note -->
  <!-- GOVERNS: knowledge rules & terms apply down to instances -->
  <line x1="800" y1="316" x2="800" y2="384" stroke="#4B5563" stroke-width="2.8" marker-end="url(#arrow-slate)"/>
  <!-- CLASSIFIES: instances tagged as governed terms (CLASSIFIED_AS), points up -->
  <line x1="1012" y1="384" x2="1012" y2="316" stroke="#4B5563" stroke-width="2.8" marker-end="url(#arrow-slate)"/>
  <!-- GOVERNS note, sitting on its arrow -->
  <rect x="714" y="326" width="172" height="44" rx="8" fill="#EEF1F5" stroke="#C3CAD3" stroke-width="1"/>
  <text x="800" y="341" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2E3540">GOVERNS</text>
  <text x="800" y="354" text-anchor="middle" font-size="9" fill="#4B5563">terms &amp; rules apply</text>
  <text x="800" y="365" text-anchor="middle" font-size="9" fill="#4B5563">down to the instances</text>
  <!-- CLASSIFIES note, sitting on its arrow -->
  <rect x="926" y="326" width="172" height="44" rx="8" fill="#EEF1F5" stroke="#C3CAD3" stroke-width="1"/>
  <text x="1012" y="341" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2E3540">CLASSIFIES</text>
  <text x="1012" y="354" text-anchor="middle" font-size="9" fill="#4B5563">CLASSIFIED_AS carries</text>
  <text x="1012" y="365" text-anchor="middle" font-size="9" fill="#4B5563">reason &#183; timestamp &#183; rule version</text>

  <!-- Instance graph -->
  <rect x="690" y="384" width="430" height="182" rx="10" fill="#E5F1FF" stroke="#018BFF" stroke-width="1.4"/>
  <text x="708" y="407" font-size="12.5" font-weight="bold" fill="#0166BC">Instance graph</text>
  <text x="1102" y="407" text-anchor="end" font-size="9.5" font-style="italic" fill="#5E97C9">the domain, connected</text>

  <!-- instance edges (under pills) -->
  <line x1="800" y1="449" x2="905" y2="449" stroke="#3D82C4" stroke-width="1.4" marker-end="url(#arrow-blue)"/>
  <text x="852" y="442" text-anchor="middle" font-size="9" fill="#3D82C4">SUPPLIES</text>
  <line x1="960" y1="462" x2="960" y2="507" stroke="#3D82C4" stroke-width="1.4" marker-end="url(#arrow-blue)"/>
  <text x="966" y="489" font-size="9" fill="#3D82C4">HAS_INVOICE</text>
  <line x1="758" y1="462" x2="758" y2="507" stroke="#3D82C4" stroke-width="1.4" marker-end="url(#arrow-blue)"/>
  <text x="764" y="489" font-size="9" fill="#3D82C4">BELONGS_TO</text>

  <!-- instance pills -->
  <rect x="712" y="432" width="90" height="30" rx="15" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.3"/>
  <text x="757" y="452" text-anchor="middle" font-size="12" fill="#0B4C7F">Supplier</text>
  <rect x="908" y="432" width="100" height="30" rx="15" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.3"/>
  <text x="958" y="452" text-anchor="middle" font-size="12" fill="#0B4C7F">Customer</text>
  <rect x="712" y="508" width="92" height="30" rx="15" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.3"/>
  <text x="758" y="528" text-anchor="middle" font-size="12" fill="#0B4C7F">BusinessUnit</text>
  <rect x="908" y="508" width="100" height="30" rx="15" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.3"/>
  <text x="958" y="528" text-anchor="middle" font-size="12" fill="#0B4C7F">Invoice</text>

  <text x="708" y="555" font-size="11" font-style="italic" fill="#5E97C9">+ RevenueEntry &#183; ComplianceFinding</text>

  <!-- ===================== Cross-panel: semantic governance binding ===================== -->
  <!-- Knowledge layer governs the source data; maps_to lineage is only one facet -->
  <path d="M 688 248 C 610 250 600 250 496 250" fill="none" stroke="#A87E0D" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-gold)"/>
  <text x="592" y="206" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#92660A">GOVERNS the source data</text>
  <text x="592" y="221" text-anchor="middle" font-size="10" fill="#92660A">maps_to lineage is one facet &#8212;</text>
  <text x="592" y="234" text-anchor="middle" font-size="10" fill="#92660A">also classifies &amp; evaluates rules</text>

  <!-- ===================== Cross-panel: Neo4j Spark Connector (bidirectional), sitting at the silver/gold seam ===================== -->
  <!-- ingest: Databricks Delta tables (silver, above) -> Neo4j graph -->
  <text x="590" y="349" text-anchor="middle" font-size="9" fill="#0F6F66">ingest: Delta &#8594; graph</text>
  <line x1="510" y1="356" x2="670" y2="356" stroke="#0F857B" stroke-width="2.4" marker-end="url(#arrow-teal)"/>
  <text x="590" y="381" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#0F6F66">Neo4j Spark Connector</text>
  <text x="590" y="393" text-anchor="middle" font-size="9" font-style="italic" fill="#4FA39B">one connector, both directions</text>
  <!-- write-back: Neo4j classifications -> Databricks Gold Delta (gold, below) -->
  <line x1="670" y1="402" x2="510" y2="402" stroke="#0F857B" stroke-width="2.4" marker-end="url(#arrow-teal)"/>
  <text x="590" y="418" text-anchor="middle" font-size="9" fill="#0F6F66">write-back: results &#8594; Gold Delta</text>
</svg>
