<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="730" viewBox="0 0 1300 730" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#71717A"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A87E0D"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F9D55"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3D82C4"/>
    </marker>
  </defs>

  <rect width="1300" height="730" fill="#ffffff"/>

  <!-- Title -->
  <text x="650" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">supplier-risk-graph: Dual Data Architecture</text>
  <text x="650" y="68" text-anchor="middle" font-size="13" fill="#555">The lakehouse owns instance data; the graph owns definitions, lineage, and provenance.</text>

  <!-- ===================== LEFT: Databricks Lakehouse ===================== -->
  <rect x="30" y="100" width="520" height="580" rx="12" fill="#FFF7F5" stroke="#FF3621" stroke-width="2"/>
  <text x="290" y="132" text-anchor="middle" font-size="17" font-weight="bold" fill="#C42B12">Databricks Lakehouse</text>
  <text x="290" y="152" text-anchor="middle" font-size="12" fill="#7A4A3F">Data / instance layer: Unity Catalog Delta tables</text>

  <!-- Fact tables -->
  <rect x="50" y="180" width="230" height="140" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="66" y="203" font-size="12.5" font-weight="bold" fill="#C42B12">Fact tables</text>
  <text x="66" y="230" font-size="12" font-family="Menlo, monospace" fill="#333">invoices</text>
  <text x="66" y="252" font-size="12" font-family="Menlo, monospace" fill="#333">payments</text>
  <text x="66" y="274" font-size="12" font-family="Menlo, monospace" fill="#333">revenue_entries</text>
  <text x="66" y="302" font-size="10.5" font-style="italic" fill="#8A5B50">append-only, aggregation-friendly</text>

  <!-- Dimension tables -->
  <rect x="300" y="180" width="230" height="140" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="316" y="203" font-size="12.5" font-weight="bold" fill="#C42B12">Dimension tables</text>
  <text x="316" y="230" font-size="12" font-family="Menlo, monospace" fill="#333">customers</text>
  <text x="316" y="252" font-size="12" font-family="Menlo, monospace" fill="#333">suppliers</text>
  <text x="316" y="274" font-size="12" font-family="Menlo, monospace" fill="#333">business_units</text>
  <text x="316" y="302" font-size="10.5" font-style="italic" fill="#8A5B50">reference data</text>

  <!-- Operational log -->
  <rect x="50" y="360" width="230" height="120" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="66" y="383" font-size="12.5" font-weight="bold" fill="#C42B12">Operational log</text>
  <text x="66" y="410" font-size="12" font-family="Menlo, monospace" fill="#333">compliance_findings</text>
  <text x="66" y="438" font-size="10.5" font-style="italic" fill="#8A5B50">open findings drive Q2 (KYC)</text>
  <text x="66" y="455" font-size="10.5" font-style="italic" fill="#8A5B50">and Q6 (strategic accounts)</text>

  <!-- ML features -->
  <rect x="300" y="360" width="230" height="120" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="316" y="383" font-size="12.5" font-weight="bold" fill="#C42B12">Derived ML features</text>
  <text x="316" y="410" font-size="12" font-family="Menlo, monospace" fill="#333">churn_risk</text>
  <text x="316" y="432" font-size="12" font-family="Menlo, monospace" fill="#333">upsell_score</text>
  <text x="316" y="454" font-size="12" font-family="Menlo, monospace" fill="#333">profitability_trend</text>

  <!-- classifications write-back table -->
  <rect x="50" y="560" width="480" height="70" rx="8" fill="#ECFDF3" stroke="#1F9D55" stroke-width="1.6"/>
  <text x="66" y="588" font-size="13" fill="#166534"><tspan font-family="Menlo, monospace" font-weight="bold">classifications</tspan><tspan dx="5">(Delta table)</tspan></text>
  <text x="66" y="610" font-size="11.5" fill="#166534">CLASSIFIED_AS results written back from the graph (Multi-Hop Native story)</text>

  <!-- ===================== RIGHT: Neo4j ===================== -->
  <rect x="750" y="100" width="520" height="580" rx="12" fill="#F2F8FF" stroke="#018BFF" stroke-width="2"/>
  <text x="1010" y="132" text-anchor="middle" font-size="17" font-weight="bold" fill="#0166BC">Neo4j</text>
  <text x="1010" y="152" text-anchor="middle" font-size="12" fill="#3F5A7A">Knowledge / semantic layer + instance mirror</text>

  <!-- Knowledge layer -->
  <rect x="770" y="175" width="480" height="220" rx="8" fill="#FFFAEC" stroke="#D4A017" stroke-width="1.4"/>
  <text x="786" y="197" font-size="12.5" font-weight="bold" fill="#92660A">Knowledge layer (EDM + terms &amp; rules)</text>

  <!-- knowledge pills row 1 -->
  <rect x="786" y="212" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="848" y="232" text-anchor="middle" font-size="12" fill="#6B4E07">BusinessTerm</text>
  <rect x="950" y="212" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1012" y="232" text-anchor="middle" font-size="12" fill="#6B4E07">BusinessRule</text>
  <rect x="1114" y="212" width="118" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1173" y="232" text-anchor="middle" font-size="12" fill="#6B4E07">EDMEntity</text>

  <!-- knowledge pills row 2 -->
  <rect x="786" y="335" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="848" y="355" text-anchor="middle" font-size="12" fill="#6B4E07">Threshold</text>
  <rect x="950" y="335" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1012" y="355" text-anchor="middle" font-size="12" fill="#6B4E07">Policy</text>
  <rect x="1114" y="335" width="118" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1173" y="355" text-anchor="middle" font-size="12" fill="#6B4E07">DataSource</text>

  <!-- knowledge edges -->
  <line x1="910" y1="228" x2="946" y2="228" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="928" y="207" text-anchor="middle" font-size="8.5" fill="#A87E0D">DEFINED_BY</text>
  <line x1="1074" y1="228" x2="1110" y2="228" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1092" y="207" text-anchor="middle" font-size="8.5" fill="#A87E0D">EVALUATES</text>
  <line x1="848" y1="335" x2="848" y2="248" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="854" y="295" font-size="8.5" fill="#A87E0D">APPLIES_TO</text>
  <line x1="1040" y1="335" x2="1138" y2="248" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1064" y="285" font-size="8.5" fill="#A87E0D">CONSTRAINS</text>
  <line x1="1173" y1="248" x2="1173" y2="331" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1179" y="295" font-size="8.5" fill="#A87E0D">MAPS_TO</text>

  <!-- layer link arrows -->
  <line x1="880" y1="440" x2="880" y2="399" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="890" y="414" font-size="9.5" font-weight="bold" fill="#4B5563">CLASSIFIED_AS</text>
  <text x="890" y="428" font-size="8.5" font-family="Menlo, monospace" fill="#4B5563">{reason, evaluatedAt, ruleVersion}</text>
  <line x1="1100" y1="399" x2="1100" y2="436" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="1110" y="421" font-size="9.5" font-weight="bold" fill="#4B5563">REALIZED_AS</text>

  <!-- Instance mirror -->
  <rect x="770" y="440" width="480" height="225" rx="8" fill="#E5F1FF" stroke="#018BFF" stroke-width="1.4"/>
  <text x="786" y="462" font-size="12.5" font-weight="bold" fill="#0166BC">Instance mirror (same CSVs as the lakehouse)</text>

  <!-- instance edges (drawn under pills) -->
  <line x1="880" y1="531" x2="986" y2="494" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="920" y="503" text-anchor="middle" font-size="8.5" fill="#3D82C4">HAS_INVOICE</text>
  <line x1="1066" y1="484" x2="1136" y2="484" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="1101" y="475" text-anchor="middle" font-size="8.5" fill="#3D82C4">SETTLED_BY</text>
  <line x1="892" y1="545" x2="1086" y2="545" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="990" y="538" text-anchor="middle" font-size="8.5" fill="#3D82C4">HAS_FINDING</text>
  <line x1="858" y1="559" x2="938" y2="600" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="874" y="588" text-anchor="middle" font-size="8.5" fill="#3D82C4">BELONGS_TO</text>
  <line x1="878" y1="616" x2="936" y2="616" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="907" y="608" text-anchor="middle" font-size="8.5" fill="#3D82C4">SUPPLIES</text>
  <line x1="1048" y1="616" x2="1116" y2="616" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="1082" y="608" text-anchor="middle" font-size="8.5" fill="#3D82C4">RECOGNIZES</text>

  <!-- instance pills -->
  <rect x="990" y="470" width="76" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1028" y="488" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Invoice</text>
  <rect x="1140" y="470" width="84" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1182" y="488" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Payment</text>

  <rect x="800" y="531" width="92" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="846" y="549" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Customer</text>
  <rect x="1090" y="531" width="146" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1163" y="549" text-anchor="middle" font-size="11.5" fill="#0B4C7F">ComplianceFinding</text>

  <rect x="790" y="602" width="88" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="834" y="620" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Supplier</text>
  <rect x="940" y="602" width="108" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="994" y="620" text-anchor="middle" font-size="11.5" fill="#0B4C7F">BusinessUnit</text>
  <rect x="1120" y="602" width="112" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1176" y="620" text-anchor="middle" font-size="11.5" fill="#0B4C7F">RevenueEntry</text>

  <text x="786" y="652" font-size="10.5" font-style="italic" fill="#3F5A7A">loaded by load.py: UNWIND batches, MERGE for re-runs</text>

  <!-- ===================== Cross-panel flows ===================== -->
  <!-- MAPS_TO lineage -->
  <path d="M 770 363 C 690 363 640 290 554 290" fill="none" stroke="#A87E0D" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-gold)"/>
  <text x="660" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#92660A">MAPS_TO lineage</text>
  <text x="660" y="312" text-anchor="middle" font-size="10" fill="#92660A">DataSource.table points at real UC tables</text>

  <!-- Virtual access option -->
  <line x1="554" y1="460" x2="766" y2="460" stroke="#999999" stroke-width="1.4" stroke-dasharray="3,4" marker-start="url(#arrow-gray)" marker-end="url(#arrow-gray)"/>
  <text x="660" y="434" text-anchor="middle" font-size="10" font-style="italic" fill="#777">Virtual access from Neo4j</text>
  <text x="660" y="448" text-anchor="middle" font-size="10" font-style="italic" fill="#777">slide option, not built in this demo</text>

  <!-- Write-back -->
  <line x1="766" y1="595" x2="536" y2="595" stroke="#1F9D55" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="655" y="570" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#166534">CLASSIFIED_AS results</text>
  <text x="655" y="584" text-anchor="middle" font-size="9.5" fill="#166534">Multi-Hop Native write-back</text>

  <!-- Legend -->
  <line x1="320" y1="708" x2="356" y2="708" stroke="#4B5563" stroke-width="1.8"/>
  <text x="364" y="712" font-size="10.5" fill="#555">data flow (built in demo)</text>
  <line x1="520" y1="708" x2="556" y2="708" stroke="#A87E0D" stroke-width="1.6" stroke-dasharray="5,4"/>
  <text x="564" y="712" font-size="10.5" fill="#555">lineage / metadata pointer</text>
  <line x1="720" y1="708" x2="756" y2="708" stroke="#999999" stroke-width="1.4" stroke-dasharray="3,4"/>
  <text x="764" y="712" font-size="10.5" fill="#555">architecture option (not built in demo)</text>
</svg>
