<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="730" viewBox="0 0 1300 730" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#71717A"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A87E0D"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F9D55"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3D82C4"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1a1a1a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1300" height="730" fill="#F3F2ED"/>

  <!-- Title -->
  <text x="650" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#16233A">Supplier Risk: Dual Data Architecture</text>
  <text x="650" y="68" text-anchor="middle" font-size="13" fill="#5C6470">The lakehouse owns the instance data; the graph owns the knowledge layer and the instance graph.</text>

  <!-- ===================== LEFT: Databricks Lakehouse ===================== -->
  <rect x="30" y="100" width="520" height="580" rx="16" fill="#FFFFFF" stroke="#E7E4DB" stroke-width="1" filter="url(#sh)"/>
  <path d="M30,144 V114 a14,14 0 0 1 14,-14 H536 a14,14 0 0 1 14,14 V144 Z" fill="#E1503A"/>
  <text x="290" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Databricks Lakehouse</text>
  <text x="290" y="165" text-anchor="middle" font-size="12" font-style="italic" fill="#8A8579">Instance layer: Unity Catalog Delta tables</text>

  <!-- Core instance tables -->
  <rect x="50" y="175" width="480" height="240" rx="8" fill="#FDF2EF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="66" y="199" font-size="11.5" font-weight="bold" letter-spacing="0.5" fill="#C42B12">CORE INSTANCE TABLES</text>
  <text x="380" y="199" font-size="8.5" font-weight="bold" letter-spacing="0.5" fill="#C89187">MAPPED TO GRAPH NODE</text>

  <!-- customers -->
  <rect x="64" y="217" width="13" height="15" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="64" y1="221" x2="77" y2="221" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="86" y="228" font-size="13" font-weight="bold" fill="#16233A">customers</text>
  <circle cx="372" cy="224" r="4" fill="#3D82C4"/><text x="380" y="228" font-size="10" fill="#5C6470">&#8594; Customer</text>

  <!-- suppliers -->
  <rect x="64" y="251" width="13" height="15" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="64" y1="255" x2="77" y2="255" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="86" y="262" font-size="13" font-weight="bold" fill="#16233A">suppliers</text>
  <circle cx="372" cy="258" r="4" fill="#3D82C4"/><text x="380" y="262" font-size="10" fill="#5C6470">&#8594; Supplier</text>

  <!-- business_units -->
  <rect x="64" y="285" width="13" height="15" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="64" y1="289" x2="77" y2="289" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="86" y="296" font-size="13" font-weight="bold" fill="#16233A">business_units</text>
  <circle cx="372" cy="292" r="4" fill="#3D82C4"/><text x="380" y="296" font-size="10" fill="#5C6470">&#8594; BusinessUnit</text>

  <!-- invoices -->
  <rect x="64" y="319" width="13" height="15" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="64" y1="323" x2="77" y2="323" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="86" y="330" font-size="13" font-weight="bold" fill="#16233A">invoices</text>
  <circle cx="372" cy="326" r="4" fill="#3D82C4"/><text x="380" y="330" font-size="10" fill="#5C6470">&#8594; Invoice</text>

  <!-- revenue_entries -->
  <rect x="64" y="353" width="13" height="15" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="64" y1="357" x2="77" y2="357" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="86" y="364" font-size="13" font-weight="bold" fill="#16233A">revenue_entries</text>
  <circle cx="372" cy="360" r="4" fill="#3D82C4"/><text x="380" y="364" font-size="10" fill="#5C6470">&#8594; RevenueEntry</text>

  <!-- compliance_findings -->
  <rect x="64" y="387" width="13" height="15" rx="2" fill="#FDECE8" stroke="#E1503A" stroke-width="1"/>
  <line x1="64" y1="391" x2="77" y2="391" stroke="#E1503A" stroke-width="1" stroke-opacity="0.45"/>
  <text x="86" y="398" font-size="13" font-weight="bold" fill="#16233A">compliance_findings</text>
  <circle cx="372" cy="394" r="4" fill="#3D82C4"/><text x="380" y="398" font-size="10" fill="#5C6470">&#8594; ComplianceFinding</text>

  <!-- Gold write-back tables -->
  <rect x="50" y="440" width="480" height="170" rx="8" fill="#ECFDF3" stroke="#1F9D55" stroke-width="1.6"/>
  <text x="66" y="464" font-size="12.5" font-weight="bold" fill="#166534">Gold write-back tables</text>
  <text x="380" y="463" font-size="8.5" font-weight="bold" letter-spacing="0.5" fill="#6FA98A">SOURCED FROM GRAPH</text>

  <!-- classifications -->
  <rect x="66" y="486" width="13" height="15" rx="2" fill="#D6F5E2" stroke="#1F9D55" stroke-width="1"/>
  <line x1="66" y1="490" x2="79" y2="490" stroke="#1F9D55" stroke-width="1" stroke-opacity="0.45"/>
  <text x="88" y="498" font-size="13" fill="#166534"><tspan font-family="Menlo, monospace" font-weight="bold">classifications</tspan><tspan dx="5">(Delta table)</tspan></text>
  <circle cx="372" cy="494" r="4" fill="#D4A017"/><text x="380" y="498" font-size="10" fill="#5C6470">&#8592; CLASSIFIED_AS</text>
  <text x="88" y="518" font-size="11" fill="#166534">each row tags a customer or supplier with a governed business term + why</text>

  <!-- business_unit_exposure -->
  <rect x="66" y="556" width="13" height="15" rx="2" fill="#D6F5E2" stroke="#1F9D55" stroke-width="1"/>
  <line x1="66" y1="560" x2="79" y2="560" stroke="#1F9D55" stroke-width="1" stroke-opacity="0.45"/>
  <text x="88" y="568" font-size="13" fill="#166534"><tspan font-family="Menlo, monospace" font-weight="bold">business_unit_exposure</tspan><tspan dx="5">(Delta table)</tspan></text>
  <circle cx="372" cy="564" r="4" fill="#3D82C4"/><text x="380" y="568" font-size="10" fill="#5C6470">&#8592; GDS on BusinessUnit</text>
  <text x="88" y="588" font-size="11" fill="#166534">supplierExposureScore per business unit: the mean risk of its suppliers</text>

  <!-- ===================== RIGHT: Neo4j ===================== -->
  <rect x="750" y="100" width="520" height="580" rx="16" fill="#FFFFFF" stroke="#E7E4DB" stroke-width="1" filter="url(#sh)"/>
  <path d="M750,144 V114 a14,14 0 0 1 14,-14 H1256 a14,14 0 0 1 14,14 V144 Z" fill="#018BFF"/>
  <text x="1010" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Neo4j</text>
  <text x="1010" y="165" text-anchor="middle" font-size="12" font-style="italic" fill="#8A8579">Knowledge Graph</text>

  <!-- Knowledge layer -->
  <rect x="770" y="175" width="480" height="220" rx="8" fill="#FFFAEC" stroke="#D4A017" stroke-width="1.4"/>
  <text x="786" y="197" font-size="12.5" font-weight="bold" fill="#92660A">Knowledge layer (entities, semantic map &amp; rules)</text>

  <!-- knowledge pills row 1 -->
  <rect x="786" y="212" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="848" y="232" text-anchor="middle" font-size="12" fill="#6B4E07">BusinessTerm</text>
  <rect x="950" y="212" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1012" y="232" text-anchor="middle" font-size="12" fill="#6B4E07">BusinessRule</text>
  <rect x="1114" y="212" width="118" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1173" y="232" text-anchor="middle" font-size="12" fill="#6B4E07">Entity</text>

  <!-- knowledge pills row 2 -->
  <rect x="786" y="335" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="848" y="355" text-anchor="middle" font-size="12" fill="#6B4E07">Threshold</text>
  <rect x="950" y="335" width="124" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1012" y="355" text-anchor="middle" font-size="12" fill="#6B4E07">Policy</text>
  <rect x="1114" y="335" width="118" height="32" rx="16" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1173" y="355" text-anchor="middle" font-size="12" fill="#6B4E07">DataSource</text>

  <!-- knowledge edges -->
  <line x1="910" y1="228" x2="946" y2="228" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="928" y="207" text-anchor="middle" font-size="8.5" fill="#A87E0D">DEFINED_BY</text>
  <line x1="1074" y1="228" x2="1110" y2="228" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1092" y="207" text-anchor="middle" font-size="8.5" fill="#A87E0D">EVALUATES</text>
  <line x1="848" y1="335" x2="848" y2="248" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="854" y="295" font-size="8.5" fill="#A87E0D">APPLIES_TO</text>
  <path d="M 1012 335 L 1012 286 L 1135 286 L 1135 246" fill="none" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1072" y="281" text-anchor="middle" font-size="8.5" fill="#A87E0D">CONSTRAINS</text>
  <line x1="1173" y1="248" x2="1173" y2="331" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1179" y="295" font-size="8.5" fill="#A87E0D">MAPS_TO</text>

  <!-- layer link arrow (bidirectional) -->
  <line x1="1010" y1="399" x2="1010" y2="436" stroke="#4B5563" stroke-width="1.8" marker-start="url(#arrow-slate)" marker-end="url(#arrow-slate)"/>
  <text x="1022" y="410" font-size="11" font-weight="bold" fill="#4B5563">governs &#8595; / classifies &#8593;</text>
  <text x="1022" y="424" font-size="8.5" fill="#4B5563">with reason, timestamp &amp; rule version</text>

  <!-- Instance mirror -->
  <rect x="770" y="440" width="480" height="225" rx="8" fill="#E5F1FF" stroke="#018BFF" stroke-width="1.4"/>
  <text x="786" y="462" font-size="12.5" font-weight="bold" fill="#0166BC">Instance graph</text>

  <!-- instance edges (drawn under pills) -->
  <line x1="880" y1="531" x2="986" y2="494" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="920" y="503" text-anchor="middle" font-size="8.5" fill="#3D82C4">HAS_INVOICE</text>
  <line x1="892" y1="545" x2="1086" y2="545" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="990" y="538" text-anchor="middle" font-size="8.5" fill="#3D82C4">HAS_FINDING</text>
  <line x1="858" y1="559" x2="938" y2="600" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="874" y="588" text-anchor="middle" font-size="8.5" fill="#3D82C4">BELONGS_TO</text>
  <line x1="878" y1="616" x2="936" y2="616" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="907" y="608" text-anchor="middle" font-size="8.5" fill="#3D82C4">SUPPLIES</text>
  <line x1="1048" y1="616" x2="1116" y2="616" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="1082" y="608" text-anchor="middle" font-size="8.5" fill="#3D82C4">RECOGNIZES</text>

  <!-- instance pills -->
  <rect x="990" y="470" width="76" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1028" y="488" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Invoice</text>

  <rect x="800" y="531" width="92" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="846" y="549" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Customer</text>
  <rect x="1090" y="531" width="146" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1163" y="549" text-anchor="middle" font-size="11.5" fill="#0B4C7F">ComplianceFinding</text>

  <rect x="790" y="602" width="88" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="834" y="620" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Supplier</text>
  <rect x="940" y="602" width="108" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="994" y="620" text-anchor="middle" font-size="11.5" fill="#0B4C7F">BusinessUnit</text>
  <rect x="1120" y="602" width="112" height="28" rx="14" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1176" y="620" text-anchor="middle" font-size="11.5" fill="#0B4C7F">RevenueEntry</text>


  <!-- ===================== Cross-panel flows ===================== -->
  <!-- MAPS_TO lineage -->
  <path d="M 766 342 C 700 342 648 300 556 278" fill="none" stroke="#A87E0D" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-gold)"/>
  <text x="662" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#92660A">MAPS_TO lineage</text>
  <text x="662" y="376" text-anchor="middle" font-size="10" fill="#92660A">DataSource.table points at real UC tables</text>

  <!-- Virtual access option -->
  <line x1="554" y1="460" x2="766" y2="460" stroke="#999999" stroke-width="1.4" stroke-dasharray="3,4" marker-start="url(#arrow-gray)" marker-end="url(#arrow-gray)"/>
  <rect x="556" y="422" width="208" height="30" rx="8" fill="#F7F7F8" stroke="#D0D0D5" stroke-width="1"/>
  <text x="660" y="441" text-anchor="middle" font-size="10" font-style="italic" fill="#8A8579">Virtual access from Neo4j (Optional)</text>

  <!-- Write-back -->
  <line x1="766" y1="547" x2="536" y2="547" stroke="#1F9D55" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="655" y="522" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#166534">CLASSIFIED_AS results</text>
  <text x="655" y="536" text-anchor="middle" font-size="9.5" fill="#166534">Multi-Hop Native write-back</text>

  <!-- Legend -->
  <line x1="320" y1="708" x2="356" y2="708" stroke="#4B5563" stroke-width="1.8"/>
  <text x="364" y="712" font-size="10.5" fill="#5C6470">data flow (built in demo)</text>
  <line x1="520" y1="708" x2="556" y2="708" stroke="#A87E0D" stroke-width="1.6" stroke-dasharray="5,4"/>
  <text x="564" y="712" font-size="10.5" fill="#5C6470">lineage / metadata pointer</text>
  <line x1="720" y1="708" x2="756" y2="708" stroke="#999999" stroke-width="1.4" stroke-dasharray="3,4"/>
  <text x="764" y="712" font-size="10.5" fill="#5C6470">architecture option (not built in demo)</text>
</svg>
