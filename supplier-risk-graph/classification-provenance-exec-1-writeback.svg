<!-- ============================================================
     SHARED TOP BLOCK — use VERBATIM in all three exec variants.
     Canvas width 1180. Replace {H} with the variant's total height
     in BOTH the <svg> tag and the background <rect>.
     Lineage region begins at y ~= 472. Footnote goes near y = {H}-24.
     ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A87E0D"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3D82C4"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F9D55"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E1503A"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1a1a1a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1180" height="640" fill="#F3F2ED"/>

  <!-- Title -->
  <text x="590" y="44" text-anchor="middle" font-size="23" font-weight="bold" fill="#16233A">Classification + Provenance</text>
  <text x="590" y="70" text-anchor="middle" font-size="13.5" fill="#5C6470">How one customer is classified as Risky Customer — a governed rule plus graph-ML early warning, every result explainable.</text>

  <!-- Customer: the record under review -->
  <rect x="490" y="92" width="200" height="48" rx="8" fill="#E5F1FF" stroke="#66AEE8" stroke-width="1.4" filter="url(#sh)"/>
  <text x="590" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B4C7F">Customer</text>
  <text x="590" y="131" text-anchor="middle" font-size="10.5" font-style="italic" fill="#5E97C9">the record under review</text>

  <!-- Customer splits down into the two evaluators -->
  <path d="M 590 140 L 590 156 L 325 156 L 325 170" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow-slate)"/>
  <path d="M 590 140 L 590 156 L 855 156 L 855 170" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow-slate)"/>

  <!-- Evaluator A: the business rule (definition) -->
  <rect x="90" y="170" width="470" height="118" rx="12" fill="#FFFAEC" stroke="#D4A017" stroke-width="1.4" filter="url(#sh)"/>
  <text x="112" y="197" font-size="11.5" font-weight="bold" letter-spacing="0.5" fill="#92660A">BUSINESS RULE — THE DEFINITION</text>
  <text x="112" y="226" font-size="15" font-weight="bold" fill="#6B4E07">Risky Customer =</text>
  <text x="112" y="249" font-size="13.5" fill="#6B4E07">more than 60 days late on each of</text>
  <text x="112" y="268" font-size="13.5" fill="#6B4E07">the last 3 invoices.</text>
  <text x="538" y="281" text-anchor="end" font-size="10" font-style="italic" fill="#B79A4E">deterministic</text>

  <!-- Evaluator B: graph algorithm, early warning -->
  <rect x="620" y="170" width="470" height="118" rx="12" fill="#E5F1FF" stroke="#018BFF" stroke-width="1.4" filter="url(#sh)"/>
  <text x="642" y="197" font-size="11.5" font-weight="bold" letter-spacing="0.5" fill="#0166BC">GRAPH ALGORITHM — EARLY WARNING</text>
  <text x="642" y="226" font-size="14" font-weight="bold" fill="#0B4C7F">kNN nearest-neighbor similarity</text>
  <text x="642" y="249" font-size="13.5" fill="#0B4C7F">flags customers that look like the known</text>
  <text x="642" y="268" font-size="13.5" fill="#0B4C7F">risky cohort — before they trip the rule.</text>
  <text x="1068" y="281" text-anchor="end" font-size="10" font-style="italic" fill="#5E97C9">graph ML</text>

  <!-- both evaluators converge into the classification result -->
  <path d="M 325 288 L 325 306 L 590 306 L 590 322" fill="none" stroke="#A87E0D" stroke-width="1.6" marker-end="url(#arrow-slate)"/>
  <path d="M 855 288 L 855 306 L 590 306 L 590 322" fill="none" stroke="#3D82C4" stroke-width="1.6" marker-end="url(#arrow-slate)"/>

  <!-- Classification result (plain English, no code fields) -->
  <rect x="315" y="322" width="550" height="128" rx="12" fill="#FBFBFC" stroke="#4B5563" stroke-width="1.6" filter="url(#sh)"/>
  <text x="338" y="350" font-size="11.5" font-weight="bold" letter-spacing="0.5" fill="#4B5563">CLASSIFIED AS</text>
  <rect x="338" y="360" width="196" height="40" rx="20" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.3"/>
  <text x="436" y="385" text-anchor="middle" font-size="16" font-weight="bold" fill="#6B4E07">Risky Customer</text>
  <text x="556" y="373" font-size="13" fill="#374151"><tspan font-weight="bold">Why</tspan>  0.91 similar to known risky peers</text>
  <text x="556" y="392" font-size="11.5" font-style="italic" fill="#6B7280">early warning — has not yet tripped the rule</text>
  <text x="556" y="420" font-size="13" fill="#374151"><tspan font-weight="bold">When</tspan>  2026-07-01</text>
  <text x="338" y="438" font-size="11" font-style="italic" fill="#9A9488">carries its own reason, score and date — verified, not an LLM guess</text>

  <!-- ================= LINEAGE REGION (variant-specific) starts ~y=472 ================= -->

  <!-- Write-back arrow: classification card bottom down to gold card top -->
  <line x1="590" y1="450" x2="590" y2="498" stroke="#1F9D55" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <text x="662" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">WRITTEN BACK</text>

  <!-- Gold write-back card -->
  <rect x="340" y="500" width="500" height="96" rx="12" fill="#ECFDF3" stroke="#1F9D55" stroke-width="1.6" filter="url(#sh)"/>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Written back to Gold — Unity Catalog</text>
  <text x="590" y="550" text-anchor="middle" font-family="Menlo, monospace" font-size="13" fill="#166534">supplier_risk.gold_customer_risk</text>
  <line x1="368" y1="562" x2="812" y2="562" stroke="#1F9D55" stroke-width="1" stroke-opacity="0.35"/>
  <text x="590" y="581" text-anchor="middle" font-size="11.5" fill="#3F7D5C">one row per classified customer:  term &#183; score &#183; reason &#183; date</text>

  <!-- Footnote -->
  <text x="590" y="618" text-anchor="middle" font-size="10" font-style="italic" fill="#8A8579">CUST-084 and 0.91 are illustrative, emergent from the run. All other values come from the data files.</text>
</svg>
