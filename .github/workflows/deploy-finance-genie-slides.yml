name: Deploy Finance Genie Slides

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-finance-genie-slides.yml
      - finance-genie/docs/demo-guide/slides/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Marp dependencies
        working-directory: finance-genie/docs/demo-guide/slides
        run: npm ci

      - name: Audit Marp dependencies
        working-directory: finance-genie/docs/demo-guide/slides
        run: npm audit --audit-level=high

      - name: Build slides
        working-directory: finance-genie/docs/demo-guide/slides
        run: npm run build:all

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: finance-genie/docs/demo-guide/slides/build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
