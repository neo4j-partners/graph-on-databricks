<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="890" viewBox="0 0 1420 890" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3D82C4"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A87E0D"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F9D55"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect width="1420" height="890" fill="#ffffff"/>

  <!-- Title -->
  <text x="710" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Finance Genie: Multi-Hop Native Data Architecture</text>
  <text x="710" y="66" text-anchor="middle" font-size="13" fill="#555">Data starts in the lakehouse, multi-hop detection runs in the graph, GDS-enriched results return to Delta for Genie to serve.</text>

  <!-- ===================== LEFT: Databricks Lakehouse ===================== -->
  <rect x="30" y="92" width="430" height="748" rx="12" fill="#FFF7F5" stroke="#FF3621" stroke-width="2"/>
  <text x="245" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#C42B12">Databricks Lakehouse</text>
  <text x="245" y="140" text-anchor="middle" font-size="12" fill="#7A4A3F">Unity Catalog Delta + Genie serving</text>

  <!-- Silver tables -->
  <rect x="48" y="164" width="394" height="184" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="64" y="187" font-size="12.5" font-weight="bold" fill="#C42B12">Silver tables — source of truth (from CSVs)</text>
  <text x="64" y="216" font-size="12" font-family="Menlo, monospace" fill="#333">accounts</text>
  <text x="64" y="239" font-size="12" font-family="Menlo, monospace" fill="#333">merchants</text>
  <text x="64" y="262" font-size="12" font-family="Menlo, monospace" fill="#333">customers <tspan font-family="Helvetica" font-style="italic" fill="#8A5B50">(KYC)</tspan></text>
  <text x="252" y="216" font-size="12" font-family="Menlo, monospace" fill="#333">transactions</text>
  <text x="252" y="239" font-size="12" font-family="Menlo, monospace" fill="#333">account_links</text>
  <text x="252" y="262" font-size="12" font-family="Menlo, monospace" fill="#333">account_labels</text>
  <text x="64" y="296" font-size="10.5" font-style="italic" fill="#8A5B50">6 base tables; column comments are Genie's metadata</text>
  <text x="64" y="314" font-size="10.5" font-style="italic" fill="#8A5B50">BEFORE Genie Space reads these only — no structural signal</text>
  <text x="64" y="332" font-size="10.5" font-style="italic" fill="#8A5B50">fraud/normal amounts within 3%, so SQL cannot separate rings</text>

  <!-- Gold tables -->
  <rect x="48" y="452" width="394" height="210" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="64" y="475" font-size="12.5" font-weight="bold" fill="#C42B12">Gold tables — graph-enriched (write-back target)</text>
  <text x="64" y="501" font-size="12" font-family="Menlo, monospace" fill="#333">gold_accounts</text>
  <text x="80" y="519" font-size="10" font-style="italic" fill="#8A5B50">+ risk_score, community_id, similarity_score, betweenness</text>
  <text x="80" y="536" font-size="10" font-style="italic" fill="#166534">+ KYC: shared_phone_count, shared_address_count,</text>
  <text x="80" y="551" font-size="10" font-style="italic" fill="#166534">   identity_cluster_id, identity_cluster_size</text>
  <text x="64" y="578" font-size="12" font-family="Menlo, monospace" fill="#333">gold_account_similarity_pairs</text>
  <text x="64" y="601" font-size="12" font-family="Menlo, monospace" fill="#333">gold_fraud_ring_communities</text>
  <text x="64" y="633" font-size="10.5" font-style="italic" fill="#8A5B50">transfer-network features + KYC identity columns,</text>
  <text x="64" y="649" font-size="10.5" font-style="italic" fill="#8A5B50">every value provably graph-derived</text>

  <!-- Genie Spaces -->
  <rect x="48" y="694" width="394" height="128" rx="8" fill="#FFFFFF" stroke="#E8998C" stroke-width="1.2"/>
  <text x="64" y="717" font-size="12.5" font-weight="bold" fill="#C42B12">Genie Spaces — natural-language serving</text>
  <rect x="64" y="730" width="176" height="72" rx="8" fill="#FFF1EE" stroke="#E8998C" stroke-width="1.2"/>
  <text x="152" y="756" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#C42B12">BEFORE</text>
  <text x="152" y="775" text-anchor="middle" font-size="10.5" fill="#7A4A3F">silver tables only</text>
  <text x="152" y="790" text-anchor="middle" font-size="10.5" fill="#7A4A3F">structural gap</text>
  <rect x="256" y="730" width="176" height="72" rx="8" fill="#ECFDF3" stroke="#1F9D55" stroke-width="1.4"/>
  <text x="344" y="756" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#166534">AFTER</text>
  <text x="344" y="775" text-anchor="middle" font-size="10.5" fill="#166534">silver + gold</text>
  <text x="344" y="790" text-anchor="middle" font-size="10.5" fill="#166534">segment answers unlocked</text>

  <!-- ===================== MIDDLE: GDS engine ===================== -->
  <rect x="500" y="296" width="150" height="336" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="575" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">GDS in Neo4j</text>

  <rect x="510" y="332" width="130" height="46" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="575" y="352" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5B21B6">PageRank</text>
  <text x="575" y="368" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#6D28D9">&#8594; risk_score</text>

  <rect x="510" y="388" width="130" height="46" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="575" y="408" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5B21B6">Louvain</text>
  <text x="575" y="424" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#6D28D9">&#8594; community_id</text>

  <rect x="510" y="444" width="130" height="46" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="575" y="464" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5B21B6">Node Similarity</text>
  <text x="575" y="480" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#6D28D9">&#8594; similarity_score</text>

  <rect x="510" y="500" width="130" height="46" rx="8" fill="#FDE68A" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="575" y="520" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5B21B6">WCC · KYC</text>
  <text x="575" y="536" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#6D28D9">&#8594; identity_cluster</text>

  <rect x="510" y="556" width="130" height="46" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="575" y="576" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5B21B6">Betweenness</text>
  <text x="575" y="592" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#6D28D9">&#8594; centrality</text>

  <text x="575" y="622" text-anchor="middle" font-size="9" font-style="italic" fill="#5B21B6">projects graph, writes node properties</text>

  <!-- ===================== RIGHT: Neo4j graph ===================== -->
  <rect x="698" y="92" width="694" height="748" rx="12" fill="#F2F8FF" stroke="#018BFF" stroke-width="2"/>
  <text x="1045" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#0166BC">Neo4j Graph</text>
  <text x="1045" y="140" text-anchor="middle" font-size="12" fill="#3F5A7A">Property graph: money movement + identity + knowledge</text>

  <!-- Money-movement layer -->
  <rect x="710" y="164" width="668" height="176" rx="8" fill="#E5F1FF" stroke="#018BFF" stroke-width="1.4"/>
  <text x="726" y="187" font-size="12.5" font-weight="bold" fill="#0166BC">Money-movement layer (instance mirror of silver)</text>

  <!-- TRANSFERRED_TO self loop on Account -->
  <path d="M 795 246 C 775 208, 875 208, 855 246" fill="none" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="825" y="204" text-anchor="middle" font-size="8.5" fill="#3D82C4">TRANSFERRED_TO</text>

  <rect x="772" y="248" width="110" height="34" rx="17" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="827" y="270" text-anchor="middle" font-size="12" fill="#0B4C7F">Account</text>
  <rect x="1150" y="248" width="110" height="34" rx="17" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2"/>
  <text x="1205" y="270" text-anchor="middle" font-size="12" fill="#0B4C7F">Merchant</text>
  <line x1="884" y1="265" x2="1148" y2="265" stroke="#3D82C4" stroke-width="1.3" marker-end="url(#arrow-blue)"/>
  <text x="1016" y="257" text-anchor="middle" font-size="8.5" fill="#3D82C4">TRANSACTED_WITH</text>

  <text x="726" y="312" font-size="10.5" font-style="italic" fill="#3F5A7A">transactions &#8594; TRANSACTED_WITH edges (bipartite, drives Node Similarity)</text>
  <text x="726" y="329" font-size="10.5" font-style="italic" fill="#3F5A7A">account_links &#8594; TRANSFERRED_TO edges (drives PageRank + Louvain)</text>

  <!-- Identity layer (KYC) -->
  <rect x="710" y="356" width="668" height="182" rx="8" fill="#F2FBF6" stroke="#1F9D55" stroke-width="1.4"/>
  <text x="726" y="379" font-size="12.5" font-weight="bold" fill="#166534">Identity layer — customer KYC</text>
  <rect x="1316" y="362" width="52" height="22" rx="11" fill="#FDE68A" stroke="#D4A017" stroke-width="1"/>
  <text x="1342" y="377" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#7A5C00">KYC</text>

  <rect x="740" y="432" width="110" height="34" rx="17" fill="#FFFFFF" stroke="#66C08A" stroke-width="1.2"/>
  <text x="795" y="454" text-anchor="middle" font-size="12" fill="#166534">Customer</text>

  <rect x="1000" y="392" width="100" height="32" rx="16" fill="#FFFFFF" stroke="#66C08A" stroke-width="1.2"/>
  <text x="1050" y="413" text-anchor="middle" font-size="11.5" fill="#166534">Phone</text>
  <rect x="1000" y="434" width="110" height="32" rx="16" fill="#FFFFFF" stroke="#66AEE8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="1055" y="455" text-anchor="middle" font-size="11.5" fill="#0B4C7F">Account</text>
  <rect x="1000" y="476" width="120" height="32" rx="16" fill="#FFFFFF" stroke="#66C08A" stroke-width="1.2"/>
  <text x="1060" y="497" text-anchor="middle" font-size="11.5" fill="#166534">Address</text>

  <line x1="850" y1="442" x2="998" y2="410" stroke="#1F9D55" stroke-width="1.3" marker-end="url(#arrow-green)"/>
  <text x="922" y="418" text-anchor="middle" font-size="8.5" fill="#1F9D55">HAS_PHONE</text>
  <line x1="850" y1="449" x2="998" y2="450" stroke="#1F9D55" stroke-width="1.3" marker-end="url(#arrow-green)"/>
  <text x="924" y="443" text-anchor="middle" font-size="8.5" fill="#1F9D55">OWNS</text>
  <line x1="850" y1="456" x2="998" y2="490" stroke="#1F9D55" stroke-width="1.3" marker-end="url(#arrow-green)"/>
  <text x="918" y="486" text-anchor="middle" font-size="8.5" fill="#1F9D55">HAS_ADDRESS</text>

  <text x="726" y="524" font-size="10.5" font-style="italic" fill="#166534">shared Phone / Address nodes MERGE on value &#8594; WCC resolves synthetic-identity clusters</text>

  <!-- Knowledge layer (KYC) -->
  <rect x="710" y="554" width="668" height="182" rx="8" fill="#FFFAEC" stroke="#D4A017" stroke-width="1.4"/>
  <text x="726" y="577" font-size="12.5" font-weight="bold" fill="#92660A">Knowledge / provenance layer (graph-only)</text>
  <rect x="1316" y="560" width="52" height="22" rx="11" fill="#FDE68A" stroke="#D4A017" stroke-width="1"/>
  <text x="1342" y="575" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#7A5C00">KYC</text>

  <rect x="724" y="616" width="96" height="34" rx="17" fill="#FFFFFF" stroke="#66C08A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="772" y="638" text-anchor="middle" font-size="11" fill="#166534">Customer</text>
  <rect x="856" y="616" width="120" height="34" rx="10" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="916" y="638" text-anchor="middle" font-size="11" fill="#6B4E07">BusinessTerm</text>
  <rect x="1014" y="616" width="118" height="34" rx="10" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1073" y="638" text-anchor="middle" font-size="11" fill="#6B4E07">BusinessRule</text>
  <rect x="1174" y="616" width="118" height="34" rx="10" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="1233" y="638" text-anchor="middle" font-size="11" fill="#6B4E07">DataSource</text>
  <rect x="856" y="682" width="120" height="34" rx="10" fill="#FFEFC2" stroke="#D4A017" stroke-width="1.2"/>
  <text x="916" y="704" text-anchor="middle" font-size="11" fill="#6B4E07">Policy</text>

  <line x1="822" y1="633" x2="854" y2="633" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow-slate)"/>
  <text x="838" y="626" text-anchor="middle" font-size="8" font-weight="bold" fill="#4B5563">CLASSIFIED_AS</text>
  <line x1="978" y1="633" x2="1012" y2="633" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="995" y="626" text-anchor="middle" font-size="8" fill="#A87E0D">DEFINED_BY</text>
  <line x1="1134" y1="633" x2="1172" y2="633" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="1153" y="626" text-anchor="middle" font-size="8" fill="#A87E0D">DERIVED_FROM</text>
  <line x1="916" y1="650" x2="916" y2="680" stroke="#A87E0D" stroke-width="1.3" marker-end="url(#arrow-gold)"/>
  <text x="922" y="670" font-size="8" fill="#A87E0D">GOVERNED_BY</text>

  <text x="726" y="728" font-size="10.5" font-style="italic" fill="#92660A">flagged customer &#8594; term &#8594; rule &#8594; policy + data-source lineage, one auditable traversal</text>

  <!-- ===================== Cross-panel flows ===================== -->
  <!-- Ingest: silver -> Neo4j -->
  <path d="M 442 250 C 560 244, 620 232, 708 232" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <text x="575" y="222" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#4B5563">Neo4j Spark Connector ingest</text>

  <!-- GDS <-> graph -->
  <line x1="706" y1="452" x2="652" y2="452" stroke="#7C3AED" stroke-width="1.6" marker-end="url(#arrow-violet)"/>
  <line x1="652" y1="480" x2="706" y2="480" stroke="#7C3AED" stroke-width="1.6" marker-end="url(#arrow-violet)"/>
  <text x="679" y="444" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#5B21B6">GDS</text>

  <!-- Write-back: Neo4j-enriched -> Gold -->
  <path d="M 710 660 C 620 690, 520 700, 444 600" fill="none" stroke="#1F9D55" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="560" y="702" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#166534">gold write-back (Multi-Hop Native)</text>

  <!-- Serve: silver -> BEFORE, gold -> AFTER -->
  <path d="M 66 348 C 42 470, 42 650, 96 728" fill="none" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <path d="M 245 662 C 300 682, 330 700, 344 726" fill="none" stroke="#1F9D55" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Legend -->
  <line x1="360" y1="866" x2="396" y2="866" stroke="#4B5563" stroke-width="2"/>
  <text x="404" y="870" font-size="10.5" fill="#555">data flow (Spark Connector)</text>
  <line x1="600" y1="866" x2="636" y2="866" stroke="#7C3AED" stroke-width="2"/>
  <text x="644" y="870" font-size="10.5" fill="#555">GDS enrichment</text>
  <line x1="770" y1="866" x2="806" y2="866" stroke="#1F9D55" stroke-width="2.2"/>
  <text x="814" y="870" font-size="10.5" fill="#555">gold write-back</text>
  <rect x="960" y="858" width="34" height="16" rx="8" fill="#FDE68A" stroke="#D4A017" stroke-width="1"/>
  <text x="1002" y="870" font-size="10.5" fill="#555">added in the KYC extension</text>
</svg>
