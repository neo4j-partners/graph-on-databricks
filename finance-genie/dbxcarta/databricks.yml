bundle:
  name: finance-genie-dbxcarta

# Consumer-owned Databricks Asset Bundle for the two dbxcarta Databricks jobs:
# ingest (build the Neo4j semantic layer over the Finance Genie catalog) and
# client (text-to-SQL evaluation across no_context / schema_dump / graph_rag).
#
# This bundle deliberately does NOT use the dbxcarta-submit operator CLI: that
# package is unpublished and rebuilds the dbxcarta wheels from the dbxcarta
# source tree, which a published consumer does not have. The jobs run the
# published console entry points (dbxcarta-ingest, dbxcarta-client) directly.
#
# SINGLE SOURCE OF CONFIG: this file holds NO dbxcarta config (catalog, schema,
# volume, secret scope, embedding/client settings). All of that lives once in
# dbxcarta-overlay.env. scripts/run_jobs.py reads the overlay and forwards every
# KEY=VALUE pair to the job at run time as task parameters
# (`databricks bundle run <job> -- KEY=VALUE ...`), the same way dbxcarta-submit
# forwards an overlay. So the jobs below declare no `parameters`: editing the
# overlay is the only place config changes, and the two can never diverge. A
# bare `databricks bundle run` with no forwarded params fails loud at config
# load rather than running with stale values.
#
# SIMULATE-PUBLISH: while dbxcarta is not on PyPI, the dbxcarta wheels are
# shipped to the cluster as local `whl:` libraries from the vendored ./dbxcarta-dist
# directory (the same committed wheels uv resolves from locally via uv.toml). The
# bundle uploads them to the workspace. Third-party dependencies (neo4j, pydantic)
# still install from PyPI normally. Refresh ./dbxcarta-dist from a dbxcarta build
# with scripts/refresh_dbxcarta_dist.sh. When dbxcarta is published, delete the
# `whl: ./dbxcarta-dist/...` lines and uncomment the `pypi:` block beneath each,
# then bump var.dbxcarta_version to the first published version. See
# dbxcarta/docs/reference/simulate-publish.md.

variables:
  cluster_id:
    description: ID of a preprovisioned classic single-user cluster (data_security_mode=SINGLE_USER). Required at deploy and run time. Owns the Spark runtime and node type; needed for the task-level Neo4j Maven connector on the ingest job.
  dbxcarta_version:
    description: dbxcarta version installed on the cluster. Matches the pins in pyproject.toml. Used only when the libraries flip from local wheels to pypi after publication.
    default: 1.1.0
  neo4j_connector_maven:
    description: Neo4j Spark Connector Maven coordinate. Ingest job only; pip cannot install it. Tracks dbxcarta-submit's pinned coordinate.
    default: org.neo4j:neo4j-connector-apache-spark_2.13:5.3.10_for_spark_3
  neo4j_python_version:
    description: Neo4j Python driver pin. A bare wheel install does not apply the dbxcarta-client[graph] extra, so the driver is added explicitly. Set to match the neo4j version already cluster-installed on the target cluster; a different version triggers ERROR_DUPLICATE_INSTALLATION.
    default: 6.0.2

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    finance_genie_dbxcarta_ingest:
      name: "[${bundle.target}] finance-genie-dbxcarta ingest"
      tasks:
        - task_key: ingest
          existing_cluster_id: ${var.cluster_id}
          python_wheel_task:
            package_name: dbxcarta-spark
            entry_point: dbxcarta-ingest
            # No parameters here. scripts/run_jobs.py forwards the overlay (plus
            # DATABRICKS_WAREHOUSE_ID) at run time as leading KEY=VALUE args. The
            # entry point's inject_params() parses them into the environment,
            # then run_dbxcarta() reads settings and fetches NEO4J_* from the
            # secret scope.
          libraries:
            # dbxcarta packages: vendored wheels in ./dbxcarta-dist (simulate-publish).
            # After publication, replace these two lines with:
            #   - pypi: { package: "dbxcarta-core==${var.dbxcarta_version}" }
            #   - pypi: { package: "dbxcarta-spark==${var.dbxcarta_version}" }
            - whl: ./dbxcarta-dist/dbxcarta_core-*.whl
            - whl: ./dbxcarta-dist/dbxcarta_spark-*.whl
            - pypi:
                package: "neo4j==${var.neo4j_python_version}"
            - maven:
                coordinates: ${var.neo4j_connector_maven}
          timeout_seconds: 7200

    finance_genie_dbxcarta_client:
      name: "[${bundle.target}] finance-genie-dbxcarta client"
      tasks:
        - task_key: client
          existing_cluster_id: ${var.cluster_id}
          python_wheel_task:
            package_name: dbxcarta-client
            entry_point: dbxcarta-client
            # No parameters here; forwarded from the overlay at run time, same as
            # the ingest job above. The overlay carries the chat endpoint,
            # embedding endpoint, client questions path, and arms the client
            # reads.
          libraries:
            # After publication, replace these two lines with:
            #   - pypi: { package: "dbxcarta-core==${var.dbxcarta_version}" }
            #   - pypi: { package: "dbxcarta-client[graph]==${var.dbxcarta_version}" }
            - whl: ./dbxcarta-dist/dbxcarta_core-*.whl
            - whl: ./dbxcarta-dist/dbxcarta_client-*.whl
            # graph_rag retrieval needs the Neo4j driver; the bare client wheel
            # does not pull the [graph] extra, so add it explicitly.
            - pypi:
                package: "neo4j==${var.neo4j_python_version}"
          timeout_seconds: 3600
