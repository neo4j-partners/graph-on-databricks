<svg xmlns="http://www.w3.org/2000/svg" width="980" height="900" viewBox="0 0 980 900" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="980" height="900" fill="#ffffff"/>

  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9e44"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67700"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c36b5"/>
    </marker>
  </defs>

  <text x="490" y="42" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e1e1e">MCP-backed simple agent (live graph)</text>

  <!-- Analyst -->
  <rect x="60" y="100" width="200" height="70" rx="10" fill="#dbe4ff" stroke="#1971c2" stroke-width="2"/>
  <text x="160" y="140" font-size="16" text-anchor="middle" fill="#1971c2">&#128100; Analyst</text>

  <!-- Supervisor -->
  <rect x="400" y="90" width="280" height="90" rx="10" fill="#dbe4ff" stroke="#1971c2" stroke-width="3"/>
  <text x="540" y="129" font-size="15" text-anchor="middle" fill="#1971c2">&#129504; Databricks Supervisor Agent</text>
  <text x="540" y="150" font-size="15" text-anchor="middle" fill="#1971c2">(routes the question)</text>

  <!-- Analyst -> Supervisor -->
  <path d="M 268 135 L 392 135" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Supervisor branch left -->
  <path d="M 484 180 L 484 230 L 260 230 L 260 272" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="335" y="225" font-size="13" text-anchor="middle" fill="#495057">graph evidence</text>

  <!-- Supervisor branch right -->
  <path d="M 596 180 L 596 230 L 760 230 L 760 272" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="765" y="225" font-size="13" text-anchor="middle" fill="#495057">silver-table BI</text>

  <!-- Finance agent endpoint -->
  <rect x="120" y="280" width="280" height="90" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="260" y="319" font-size="15" text-anchor="middle" fill="#2f9e44">&#9881; Finance agent endpoint</text>
  <text x="260" y="340" font-size="15" text-anchor="middle" fill="#2f9e44">(Model Serving)</text>

  <!-- Finance -> UC -->
  <path d="M 260 370 L 260 442" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="272" y="412" font-size="13" text-anchor="start" fill="#495057">Databricks MCP proxy</text>

  <!-- UC HTTP connection -->
  <rect x="120" y="450" width="280" height="90" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="260" y="489" font-size="15" text-anchor="middle" fill="#2f9e44">&#128279; UC HTTP connection</text>
  <text x="260" y="510" font-size="15" text-anchor="middle" fill="#2f9e44">(MCP enabled)</text>

  <!-- UC -> Neo4j -->
  <path d="M 260 540 L 260 612" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="272" y="582" font-size="13" text-anchor="start" fill="#495057">AgentCore gateway / Neo4j MCP</text>

  <!-- Neo4j -->
  <rect x="120" y="620" width="280" height="80" rx="10" fill="#ffe8cc" stroke="#e67700" stroke-width="3"/>
  <text x="260" y="665" font-size="16" text-anchor="middle" fill="#e67700">&#128451; Neo4j (Graph + GDS)</text>

  <!-- Genie Space -->
  <rect x="620" y="280" width="280" height="90" rx="10" fill="#f3d9fa" stroke="#9c36b5" stroke-width="2"/>
  <text x="760" y="319" font-size="15" text-anchor="middle" fill="#9c36b5">&#128202; Genie Space</text>
  <text x="760" y="340" font-size="15" text-anchor="middle" fill="#9c36b5">(Unity Catalog Silver Delta)</text>

  <!-- Supervisor synthesis -->
  <rect x="360" y="780" width="280" height="80" rx="10" fill="#dbe4ff" stroke="#1971c2" stroke-width="3"/>
  <text x="500" y="825" font-size="16" text-anchor="middle" fill="#1971c2">&#9989; Supervisor synthesis</text>

  <!-- Neo4j -> synthesis -->
  <path d="M 260 700 L 260 820 L 352 820" fill="none" stroke="#e67700" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Genie -> synthesis (long vertical) -->
  <path d="M 760 370 L 760 820 L 648 820" fill="none" stroke="#9c36b5" stroke-width="2" marker-end="url(#arrowPurple)"/>
</svg>
